<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="./vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Neural Network Training Simulation</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script type="module" crossorigin src="./assets/index-TL-OTlVr.js"></script>
  <link rel="stylesheet" crossorigin href="./assets/index-B8ztZVKe.css">
</head>

<body>
  <!-- Full-screen simulation background -->
  <canvas id="simulation-canvas"></canvas>

  <!-- Floating panel overlay -->
  <div id="panel-layer"></div>

  <!-- Fixed toolbar -->
  <div id="toolbar">
    <span class="toolbar-brand">🧬 NN Sim</span>
    <button class="toolbar-btn toolbar-btn--active" data-toggle-panel="brain" title="Brain Visualisation">🧠
      Brain</button>
    <button class="toolbar-btn toolbar-btn--active" data-toggle-panel="minimap" title="Minimap">🗺 Map</button>
    <button class="toolbar-btn toolbar-btn--active" data-toggle-panel="chart" title="Chart">📈 Chart</button>
    <button class="toolbar-btn toolbar-btn--active" data-toggle-panel="config" title="Config">⚙️ Config</button>
    <button class="toolbar-btn" data-toggle-panel="track" title="Track Editor">🛣 Track</button>
    <button class="toolbar-btn toolbar-btn--active" data-toggle-panel="saveload" title="Save/Load">💾 Save</button>
    <button class="toolbar-btn toolbar-btn--active" data-toggle-panel="debug" title="Debug">🐛 Debug</button>
    <div class="toolbar-spacer"></div>
    <button class="toolbar-btn" id="btn-pause" title="Pause / Resume simulation">⏸ Pause</button>
    <button class="toolbar-btn" id="btn-zoom-out" title="Zoom out">－</button>
    <span id="toolbar-zoom" class="toolbar-info">100%</span>
    <button class="toolbar-btn" id="btn-zoom-in" title="Zoom in">＋</button>
    <button class="toolbar-btn" id="btn-zoom-reset" title="Reset zoom to fit track">⊞ Fit</button>
    <button class="toolbar-btn" id="btn-reset-panels" title="Reset all panel positions to defaults">⟳ Panels</button>
  </div>

  <script src="./brain-browser.min.js"></script>
</body>

</html>
